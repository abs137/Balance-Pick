<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Balance Pick Summary</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body {
    font-family: Segoe UI, Arial;
    margin: 25px;
    background-color: #F4F6FA;
}

h2 {
    color: #2F5597;
}

.control-panel {
    display: flex;
    gap: 30px;
    margin-bottom: 20px;
}

select, input {
    padding: 6px 10px;
    font-size: 14px;
    min-width: 160px;
}

table {
    border-collapse: collapse;
    background-color: white;
    font-size: 13px;
    box-shadow: 0 0 10px rgba(0,0,0,0.08);
}

th {
    background-color: #4472C4;
    color: white;
    font-weight: bold;
    padding: 8px 14px;
    border: 1px solid #C5D1E0;
}

td {
    padding: 7px 14px;
    border: 1px solid #E0E0E0;
    text-align: center;
}

/* First two columns bold */
td:first-child,
td:nth-child(2) {
    font-weight: bold;
    background-color: #F2F2F2;
}

/* Alternate rows */
tr:nth-child(even):not(.total-row) {
    background-color: #FAFAFA;
}

/* Total row */
.total-row {
    background-color: #D9E1F2 !important;
    font-weight: bold;
}

/* Hover effect */
tr:hover:not(.total-row) {
    background-color: #E7F1FF;
}

</style>

</head>

<body>

<h2>Balance Pick Summary</h2>

<div class="control-panel">

<div>
Concept<br>
<select id="sheetSelect"></select>
</div>

<div>
Zone<br>
<select id="zoneSelect"></select>
</div>

<div>
DEST_ID Search<br>
<input type="text" id="destSearch" placeholder="Enter DEST_ID">
</div>

</div>

<div id="tableContainer"></div>

<script>

let workbook;
let currentData;


/* Load Excel with cache bypass */
fetch("Balance_Pick_Summary.xlsx?v=" + new Date().getTime())
.then(response => response.arrayBuffer())
.then(data => {

    workbook = XLSX.read(data, { type: "array" });

    populateConceptDropdown();

});


/* Populate Concept dropdown */
function populateConceptDropdown() {

    let dropdown = document.getElementById("sheetSelect");

    dropdown.innerHTML = "";

    workbook.SheetNames.forEach(name => {

        let option = document.createElement("option");

        option.value = name;
        option.text = name;

        dropdown.appendChild(option);

    });

    /* Restore saved Concept */
    let savedConcept = localStorage.getItem("selectedConcept");

    if(savedConcept && workbook.SheetNames.includes(savedConcept))
        dropdown.value = savedConcept;

    loadSheet(dropdown.value);

}


/* Concept change */
document.getElementById("sheetSelect").addEventListener("change", function() {

    localStorage.setItem("selectedConcept", this.value);

    loadSheet(this.value);

});


/* Zone change */
document.getElementById("zoneSelect").addEventListener("change", function(){

    localStorage.setItem("selectedZone", this.value);

    renderTable();

});


/* DEST search */
document.getElementById("destSearch").addEventListener("input", renderTable);



/* Load selected sheet */
function loadSheet(sheetName) {

    let sheet = workbook.Sheets[sheetName];

    currentData = XLSX.utils.sheet_to_json(sheet, { header: 1 });

    populateZoneDropdown();

    renderTable();

}


/* Populate Zone dropdown */
function populateZoneDropdown() {

    let dropdown = document.getElementById("zoneSelect");

    dropdown.innerHTML = "";

    /* All Zones option */
    let allOption = document.createElement("option");

    allOption.value = "ALL";
    allOption.text = "All Zones";

    dropdown.appendChild(allOption);

    currentData[0].forEach((header, index) => {

        if(index >= 2 && header !== "Total") {

            let option = document.createElement("option");

            option.value = index;
            option.text = header;

            dropdown.appendChild(option);

        }

    });

    /* Restore saved Zone */
    let savedZone = localStorage.getItem("selectedZone");

    if(savedZone && [...dropdown.options].some(o => o.value === savedZone))
        dropdown.value = savedZone;
    else
        dropdown.value = "ALL";

}


/* Render table */
function renderTable() {

    let zoneValue = document.getElementById("zoneSelect").value;

    let searchText =
        document.getElementById("destSearch").value.toLowerCase();

    let zoneIndexes = [];

    if(zoneValue === "ALL") {

        currentData[0].forEach((header, index) => {

            if(index >= 2 && header !== "Total")
                zoneIndexes.push(index);

        });

    }
    else {

        zoneIndexes.push(parseInt(zoneValue));

    }


    let html = "<table>";

    html += "<tr>";

    html += "<th>"+currentData[0][0]+"</th>";

    html += "<th>"+currentData[0][1]+"</th>";

    zoneIndexes.forEach(i => {

        html += "<th>"+currentData[0][i]+"</th>";

    });

    html += "<th>Total</th>";

    html += "</tr>";


    for(let i=1; i<currentData.length; i++) {

        let row = currentData[i];

        let isTotal = row[0] === "Total";

        if(!isTotal) {

            let dest = String(row[1]).toLowerCase();

            if(searchText && !dest.includes(searchText))
                continue;

        }

        html += "<tr class='"+(isTotal?"total-row":"")+"'>";

        html += "<td>"+(row[0]||"")+"</td>";

        html += "<td>"+(row[1]||"")+"</td>";

        zoneIndexes.forEach(index => {

            html += "<td>"+(row[index]||"")+"</td>";

        });

        html += "<td>"+(row[row.length-1]||"")+"</td>";

        html += "</tr>";

    }

    html += "</table>";

    document.getElementById("tableContainer").innerHTML = html;

}

</script>

</body>
</html>
